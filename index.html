<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 Computer Status Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-online {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.05), 0 0 15px rgba(34, 197, 94, 0.1);
        }
        .card-online:hover {
            box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.1), 0 0 25px rgba(34, 197, 94, 0.2);
            transform: translateY(-5px);
        }
        .card-offline {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-offline:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.1);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="text-white p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-500/20 rounded-2xl border border-blue-500/30">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">Live Dashboard</h1>
                    <p class="text-gray-400 text-sm mt-1">Real-time computer monitoring system</p>
                </div>
            </div>
            
            <a href="history.html" class="group flex items-center gap-2 glass-panel hover:bg-white/10 px-6 py-3 rounded-full transition-all duration-300">
                <svg class="w-5 h-5 text-indigo-400 group-hover:text-indigo-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="font-semibold text-gray-200">View History</span>
            </a>
        </header>
        
        <!-- Dashboard Grid -->
        <div id="pc-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <!-- Loading State -->
            <div class="col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-400 mb-4"></div>
                <p class="text-lg">Connecting to network...</p>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://my-computer-lap-default-rtdb.asia-southeast1.firebasedatabase.app/computers.json";

        async function updateDashboard() {
            try {
                const response = await fetch(FB_URL);
                const data = await response.json();
                const container = document.getElementById('pc-container');
                
                if (!data) {
                    container.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                            <svg class="w-16 h-16 mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                            <p class="text-xl">Waiting for clients...</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                const now = Math.floor(Date.now() / 1000);

                let pcList = [];
                for (let pc in data) {
                    const lastSeen = Math.floor(data[pc].last_seen / 1000);
                    const isOnline = (now - lastSeen) < 180;
                    pcList.push({ name: pc, lastSeen: data[pc].last_seen, isOnline: isOnline });
                }

                pcList.sort((a, b) => {
                    if (a.isOnline === b.isOnline) return a.name.localeCompare(b.name);
                    return a.isOnline ? -1 : 1;
                });

                for (let pcData of pcList) {
                    const isOnline = pcData.isOnline;
                    const timeString = new Date(pcData.lastSeen).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                    // เตรียมการแสดงผลชั่วโมงการใช้งาน
                    let usageHours = data[pcData.name].usage_hours || data[pcData.name].total_hours || '-';
                    if (typeof usageHours === 'number') {
                        usageHours = usageHours.toFixed(2) + ' ชม.';
                    } else if (usageHours === '-') {
                        usageHours = 'กำลังเก็บข้อมูล...';
                    }

                    const cardClass = isOnline ? 'card-online' : 'card-offline opacity-60';
                    const indicatorClass = isOnline ? 'bg-green-400 shadow-[0_0_8px_#4ade80] animate-pulse' : 'bg-gray-500';
                    const titleClass = isOnline ? 'text-green-50' : 'text-gray-400';
                    
                    container.innerHTML += `
                        <div class="rounded-2xl p-6 transition-all duration-500 flex flex-col items-center relative overflow-hidden group ${cardClass}">
                            <!-- Decorative background glow -->
                            ${isOnline ? '<div class="absolute -top-10 -right-10 w-24 h-24 bg-green-500/20 rounded-full blur-2xl"></div>' : ''}
                            
                            <!-- Icon -->
                            <div class="mb-4 relative">
                                <svg class="w-10 h-10 ${isOnline ? 'text-green-400' : 'text-gray-500'} transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                <span class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full border-2 border-[#0f172a] ${indicatorClass}"></span>
                            </div>

                            <div class="text-xl font-bold tracking-wide mb-1 z-10 ${titleClass}">${pcData.name}</div>
                            
                            <div class="text-xs font-medium uppercase tracking-wider mb-5 z-10 ${isOnline ? 'text-green-400/80' : 'text-gray-500'}">
                                ${isOnline ? 'Online' : 'Offline'}
                            </div>

                            <div class="mt-auto w-full z-10 flex flex-col gap-2">
                                <div class="bg-black/20 rounded-lg p-2.5 flex justify-between items-center text-xs border border-white/5">
                                    <span class="text-gray-400 flex items-center gap-1.5">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${isOnline ? 'ออนไลน์ล่าสุด' : 'ออฟไลน์เมื่อ'}
                                    </span>
                                    <span class="text-gray-200 font-medium">${timeString} น.</span>
                                </div>
                                <div class="bg-black/20 rounded-lg p-2.5 flex justify-between items-center text-xs border border-white/5">
                                    <span class="text-gray-400 flex items-center gap-1.5">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ชั่วโมงใช้งาน
                                    </span>
                                    <span class="text-indigo-300 font-medium">${usageHours}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
