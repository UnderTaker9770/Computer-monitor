<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการใช้งานคอมพิวเตอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold italic text-blue-400">📊 USAGE HISTORY</h1>
            <a href="index.html" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition">🏠 กลับหน้าหลัก</a>
        </div>

        <div class="bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
            <table class="w-full text-left">
                <thead class="bg-slate-700 text-slate-300 uppercase text-xs">
                    <tr>
                        <th class="p-4">ชื่อเครื่อง</th>
                        <th class="p-4">สถานะล่าสุด</th>
                        <th class="p-4">เวลาที่ตรวจพบ</th>
                    </tr>
                </thead>
                <tbody id="history-table" class="divide-y divide-slate-700">
                    <tr>
                        <td colspan="3" class="p-10 text-center text-slate-500 italic">กำลังโหลดประวัติการใช้งาน...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // URL ฐานข้อมูลล่าสุดของคุณ
        const FB_URL = "https://my-computer-lap-default-rtdb.asia-southeast1.firebasedatabase.app/computers.json";

        async function loadHistory() {
            try {
                const response = await fetch(FB_URL);
                const data = await response.json();
                const tableBody = document.getElementById('history-table');
                
                if (!data) {
                    tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center opacity-50">ไม่พบประวัติข้อมูล</td></tr>';
                    return;
                }

                tableBody.innerHTML = ''; // ล้างข้อมูลเก่า
                
                // แปลงข้อมูลจาก Object เป็น Array เพื่อเรียงลำดับ
                const records = Object.keys(data).map(key => ({
                    name: key,
                    ...data[key]
                }));

                // เรียงตามเวลาล่าสุดขึ้นก่อน
                records.sort((a, b) => b.last_seen - a.last_seen);

                records.forEach(record => {
                    const date = new Date(record.last_seen);
                    const timeString = date.toLocaleDateString('th-TH') + ' ' + date.toLocaleTimeString('th-TH');
                    
                    const row = `
                        <tr class="hover:bg-slate-700/50 transition">
                            <td class="p-4 font-bold text-blue-300">${record.name}</td>
                            <td class="p-4">
                                <span class="px-2 py-1 rounded text-[10px] bg-green-500/20 text-green-400 border border-green-500/50">
                                    ACTIVE
                                </span>
                            </td>
                            <td class="p-4 text-slate-400 text-sm">${timeString}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('history-table').innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-400">เชื่อมต่อฐานข้อมูลล้มเหลว</td></tr>';
            }
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้า
        loadHistory();
        // อัปเดตทุก 30 วินาที
        setInterval(loadHistory, 30000);
    </script>
</body>
</html>
