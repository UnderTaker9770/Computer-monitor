<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Usage History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .table-row-glass {
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .table-row-glass:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Custom inputs */
        input[type="date"] {
            color-scheme: dark;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="text-white p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-500/20 rounded-2xl border border-indigo-500/30">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                </div>
                <div>
                    <h1
                        class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-300">
                        Activity History</h1>
                    <p class="text-gray-400 text-sm mt-1">Daily computer usage records</p>
                </div>
            </div>

            <a href="index.html"
                class="group flex items-center gap-2 glass-panel hover:bg-white/10 px-6 py-3 rounded-full transition-all duration-300">
                <svg class="w-5 h-5 text-gray-400 group-hover:-translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span class="font-semibold text-gray-200">Back to Dashboard</span>
            </a>
        </header>

        <div class="glass-panel rounded-3xl p-6 md:p-8">
            <!-- Filter Section -->
            <div class="flex flex-col sm:flex-row gap-4 mb-8 items-center justify-between">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="p-2 bg-white/5 rounded-lg border border-white/10">
                        <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Select
                            Date / เลือกวันที่</label>
                        <input type="date" id="date-picker" onchange="loadHistoryByDate()"
                            class="text-sm px-4 py-2 rounded-xl text-white transition-all w-full sm:w-48 cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="overflow-x-auto rounded-2xl border border-white/5">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="bg-black/20 text-xs uppercase tracking-wider text-gray-400">
                            <th class="p-5 font-semibold">ชื่อเครื่อง</th>
                            <th class="p-5 font-semibold">เปิดใช้งานครั้งแรก (ของวัน)</th>
                            <th class="p-5 font-semibold">อัปเดตล่าสุด</th>
                            <th class="p-5 font-semibold">ชั่วโมงการใช้งาน (ชม.)</th>
                            <th class="p-5 font-semibold">สถานะปัจจุบัน</th>
                        </tr>
                    </thead>
                    <tbody id="history-table" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="5" class="p-10 text-center text-gray-500">กรุณาเลือกวันที่ต้องการตรวจสอบ</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://my-computer-lap-default-rtdb.asia-southeast1.firebasedatabase.app/history";
        let historyInterval = null;

        // ตั้งค่าให้ปฏิทินเป็นวันปัจจุบันโดยอัตโนมัติ และดึงข้อมูลทันที
        window.addEventListener('DOMContentLoaded', () => {
            // ใช้ local timezone ในการหาวันที่ปัจจุบัน (YYYY-MM-DD)
            const today = new Date();
            const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            document.getElementById('date-picker').value = localDate;
            
            // โหลดครั้งแรก โชว์ Spinner
            loadHistoryByDate(true);
            
            // ดึงข้อมูล Real-time ทุก 3 วินาที
            historyInterval = setInterval(() => {
                loadHistoryByDate(false);
            }, 3000);
        });

        // เมื่อผู้ใช้เปลี่ยนวันที่ในปฏิทินด้วยตัวเอง
        document.getElementById('date-picker').addEventListener('change', () => {
            loadHistoryByDate(true); // โชว์ Spinner เมื่อสลับวัน
        });

        async function loadHistoryByDate(showSpinner = false) {
            const selectedDate = document.getElementById('date-picker').value;
            const table = document.getElementById('history-table');

            if (!selectedDate) return;

            if (showSpinner) {
                table.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-16 text-center">
                            <div class="flex flex-col items-center justify-center text-indigo-300">
                                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-400 mb-4"></div>
                                <span class="text-sm font-medium tracking-wide">กำลังโหลดข้อมูล...</span>
                            </div>
                        </td>
                    </tr>
                `;
            }

            try {
                const response = await fetch(`${BASE_URL}/${selectedDate}.json`);
                const data = await response.json();

                if (!data) {
                    table.innerHTML = `
                        <tr>
                            <td colspan="5" class="p-16 text-center">
                                <div class="flex flex-col items-center justify-center text-gray-500">
                                    <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                    <span class="text-base">ไม่มีข้อมูลการใช้งานในวันที่เลือก</span>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                let newHTML = '';
                for (let pc in data) {
                    const lastSeenTime = new Date(data[pc].last_seen).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                    let firstStartupTime = "-";
                    if (data[pc].first_startup_time) {
                        firstStartupTime = new Date(data[pc].first_startup_time).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    }

                    let usageHours = data[pc].usage_hours || data[pc].total_hours || '-';
                    if (typeof usageHours === 'number') {
                        usageHours = usageHours.toFixed(4); // โชว์ทศนิยม 4 ตำแหน่งให้เห็นว่าเลขเดินตลอด
                    }

                    // สถานะ
                    const now = Math.floor(Date.now() / 1000);
                    const lastSeenSec = Math.floor(data[pc].last_seen / 1000);
                    const isOnline = (data[pc].status === 'offline') ? false : ((now - lastSeenSec) < 45);
                    let statusBadge = isOnline ?
                        `<span class="inline-flex items-center gap-1.5 bg-green-500/10 text-green-400 px-3 py-1.5 rounded-lg text-xs font-bold border border-green-500/20 shadow-[0_0_10px_rgba(74,222,128,0.1)]"><span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>ออนไลน์</span>` :
                        `<span class="inline-flex items-center gap-1.5 bg-gray-500/10 text-gray-400 px-3 py-1.5 rounded-lg text-xs font-bold border border-gray-500/20"><span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span>ออฟไลน์</span>`;

                    newHTML += `
                        <tr class="table-row-glass group">
                            <td class="p-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center group-hover:bg-indigo-500/20 transition-colors">
                                        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                    </div>
                                    <span class="font-bold text-gray-200 tracking-wide">${pc}</span>
                                </div>
                            </td>
                            <td class="p-5 text-indigo-200 text-sm font-medium">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${firstStartupTime} น.
                                </div>
                            </td>
                            <td class="p-5 text-gray-400 text-sm">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${lastSeenTime} น.
                                </div>
                            </td>
                            <td class="p-5">
                                <span class="text-indigo-300 font-semibold bg-indigo-500/10 px-3 py-1 rounded-lg border border-indigo-500/20">${usageHours}</span>
                            </td>
                            <td class="p-5">
                                ${statusBadge}
                            </td>
                        </tr>
                    `;
                }
                table.innerHTML = newHTML;

            } catch (err) {
                table.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-10 text-center text-red-400">
                            <div class="flex flex-col items-center gap-2">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์
                            </div>
                        </td>
                    </tr>
                `;
            }
        }
    </script>
</body>

</html>
