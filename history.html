<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูประวัติย้อนหลัง</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-5">
    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-700">📅 ตรวจสอบประวัติการใช้งานย้อนหลัง</h1>
        
        <div class="flex gap-4 mb-8 justify-center items-end">
            <div>
                <label class="block text-sm font-bold mb-1">เลือกวันที่:</label>
                <input type="date" id="date-picker" class="border p-2 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="loadHistoryByDate()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">ดึงข้อมูล</button>
        </div>

        <div class="overflow-hidden border rounded-xl">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4">ชื่อเครื่อง</th>
                        <th class="p-4">เวลาที่พบเครื่องล่าสุด</th>
                        <th class="p-4">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="history-table" class="divide-y">
                    <tr><td colspan="3" class="p-10 text-center text-slate-400">กรุณาเลือกวันที่ต้องการตรวจสอบ</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const BASE_URL = "https://my-computer-lap-default-rtdb.asia-southeast1.firebasedatabase.app/history";

        // ตั้งค่าให้ปฏิทินเป็นวันปัจจุบันโดยอัตโนมัติ
        document.getElementById('date-picker').value = new Date().toISOString().split('T')[0];

        async function loadHistoryByDate() {
            const selectedDate = document.getElementById('date-picker').value;
            const table = document.getElementById('history-table');
            
            if (!selectedDate) return alert("กรุณาเลือกวันที่");

            table.innerHTML = '<tr><td colspan="3" class="p-10 text-center">กำลังโหลดข้อมูล...</td></tr>';

            try {
                const response = await fetch(`${BASE_URL}/${selectedDate}.json`);
                const data = await response.json();

                if (!data) {
                    table.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-500">ไม่มีข้อมูลการใช้งานในวันที่เลือก</td></tr>';
                    return;
                }

                table.innerHTML = '';
                for (let pc in data) {
                    const time = new Date(data[pc].last_seen).toLocaleTimeString('th-TH');
                    table.innerHTML += `
                        <tr class="hover:bg-blue-50">
                            <td class="p-4 font-bold">${pc}</td>
                            <td class="p-4">${time} น.</td>
                            <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">เคยใช้งาน</span></td>
                        </tr>
                    `;
                }
            } catch (err) {
                table.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
            }
        }
    </script>
</body>
</html>
